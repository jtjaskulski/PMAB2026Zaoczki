services:
  api:
    build:
      context: .
      dockerfile: SolutionOrders.API/Dockerfile
    container_name: solutionorders-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=PMAB2026Zaoczki;User=sa;Password=YourStrong@Password123;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - dev-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU16-ubuntu-22.04
    container_name: PMAB2026Zaoczki-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - PMAB2026Zaoczki-data:/var/opt/mssql
    networks:
      - dev-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P YourStrong@Password123 -Q "SELECT 1" -b -o /dev/null
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  dev-network:
    driver: bridge

volumes:
  PMAB2026Zaoczki-data: